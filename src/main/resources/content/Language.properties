auth0-integration-configuration-name=Auth0 — integración Circulo Atención
cookies-secure=Cookies Secure (HTTPS)
cookies-secure-help=Marcar en DEV, QA y PROD con HTTPS. Dejar desmarcado en local con HTTP.
post-login-redirect-path=Ruta tras login exitoso
post-login-redirect-path-help=Ruta relativa al host del portal (p. ej. /group/guest/home).
cookie-same-site=SameSite en cookies OAuth
cookie-same-site-help=lax (recomendado), strict o none. Vacío omite SameSite. none exige HTTPS (Secure).
portal-access-app-claim-uri-help=URI del claim JSON del id_token para la aplicación (p. ej. https://circulo.com/app).
portal-expected-app-help=Valor exigido en ese claim (p. ej. portal).
portal-roles-claim-uri-help=URI del claim con array de roles (p. ej. https://circulo.com/roles).
portal-allowed-roles-help=Lista separada por comas; el token debe incluir al menos uno (insensible a mayúsculas).
auth-bridge-data-claim-uri-help=URI del objeto con nombre, apellidos, correo, usuario (auth-bridge).
portal-access-app-claim-uri=URI claim aplicación (circulo.com/app)
portal-expected-app=Valor aplicación permitida
portal-roles-claim-uri=URI claim roles (circulo.com/roles)
portal-allowed-roles=Roles permitidos (coma)
auth-bridge-data-claim-uri=URI objeto auth-bridge (data)
auth0-oauth-error-page-path=Ruta página errores OAuth (portlet)
auth0-oauth-error-page-path-help=Página del portal donde está el portlet React de error Auth0 (p. ej. /web/guest/error-auth). El callback añade ?code= con el error OAuth.
auth0-email-not-verified-page-path=Ruta página email no verificado
auth0-email-not-verified-page-path-help=Página del portal cuando Auth0 deniega el login por email no verificado (p. ej. /web/guest/email-no-verificado). Vacío usa la misma ruta por defecto.
